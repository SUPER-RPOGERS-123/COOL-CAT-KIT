# Render Blueprint — должен лежать в КОРНЕ репозитория.
# Деплой: render.com → New → Blueprint → выбрать этот репозиторий.
# Бэкенд лежит в подпапке backend/ — на неё указывает rootDir.
services:
  - type: web
    name: coolcatkit-api
    runtime: docker
    rootDir: backend
    plan: free
    region: frankfurt
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: coolcatkit-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true          # Render сам сгенерит секрет
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      - key: AUTO_INIT_DB
        value: "1"
      # адрес фронта на GitHub Pages (origin без пути). ПОДТВЕРДИ/ПОПРАВЬ:
      - key: CORS_ORIGINS
        value: https://super-rpogers-123.github.io

databases:
  - name: coolcatkit-db
    plan: free
    region: frankfurt
