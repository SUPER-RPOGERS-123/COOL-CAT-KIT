<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вес кота — Cool Cat Kit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css?v=8">
</head>
<body data-page="weight">
  <main class="wrap">
    <div class="section-head">
      <h1>Вес кота</h1>
      <span class="spacer"></span>
      <a class="btn btn--teal btn--sm" href="profile.html">паспорт кота</a>
    </div>
    <p class="muted">Записывай вес время от времени — график покажет, как меняется форма котика.</p>

    <div class="card card--tilt-l" style="margin:22px 0">
      <span class="tape"></span>
      <h3>Новое измерение</h3>
      <form id="weightForm">
        <div class="field-row">
          <div class="field"><label>Дата</label><input name="date" type="date" required></div>
          <div class="field"><label>Вес, кг</label><input name="kg" type="number" step="0.01" min="0.3" max="30" required placeholder="4.2"></div>
        </div>
        <button class="btn btn--block" type="submit" style="margin-top:6px">+ Добавить</button>
      </form>
    </div>

    <div class="card weight-chart-card" id="chartCard">
      <div class="weight-chart-head">
        <h3>Динамика</h3>
        <div id="weightStats" class="weight-stats"></div>
      </div>
      <div class="weight-canvas-wrap"><canvas id="weightChart"></canvas></div>
    </div>

    <section class="weight-list" id="weightList"></section>
  </main>

  <footer class="foot">в форме и в радости 🐾</footer>

  <script src="../js/app.js?v=8"></script>
  <script src="../js/pages.js?v=8"></script>
</body>
</html>
