<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Советы по еде — Cool Cat Kit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css?v=13">
</head>
<body data-page="food">
  <main class="wrap">
    <div class="section-head"><h1>Калькулятор корма</h1></div>
    <p class="muted">Прикидываем суточную норму по ветеринарной формуле (RER → суточная энергия). Это ориентир, а не замена совету ветеринара.</p>

    <div class="food-layout">
      <div class="card card--tilt-l">
        <span class="tape"></span>
        <h3>Параметры котика</h3>
        <form id="foodForm">
          <div class="field"><label>Вес, кг</label>
            <input name="kg" type="number" step="0.1" min="0.3" max="30" required placeholder="4.2">
          </div>
          <div class="field"><label>Возраст / стадия</label>
            <select name="stage">
              <option value="kitten">Котёнок (до 1 года)</option>
              <option value="adult" selected>Взрослый</option>
              <option value="senior">Пожилой (7+ лет)</option>
            </select>
          </div>
          <div class="field"><label>Активность</label>
            <select name="activity">
              <option value="low">Малоподвижный / домосед</option>
              <option value="normal" selected>Обычная</option>
              <option value="high">Активный / много играет</option>
            </select>
          </div>
          <div class="field"><label>Стерилизация</label>
            <select name="neutered">
              <option value="yes" selected>Стерилизован / кастрирован</option>
              <option value="no">Нет</option>
            </select>
          </div>
          <div class="field"><label>Калорийность корма, ккал / 100 г <span class="muted">(с пачки)</span></label>
            <input name="kcal" type="number" step="1" min="50" max="600" value="360">
          </div>
          <button class="btn btn--block" type="submit">Рассчитать</button>
        </form>
      </div>

      <div class="card food-result card--tilt-r" id="foodResult">
        <span class="tape tape--blue"></span>
        <h3>Суточная норма</h3>
        <div id="foodOut"><p class="muted">Заполни параметры и нажми «Рассчитать».</p></div>
      </div>
    </div>
  </main>

  <footer class="foot">кормим с умом, любим без меры 🍗</footer>

  <script src="../js/app.js?v=13"></script>
  <script src="../js/pages.js?v=13"></script>
</body>
</html>
