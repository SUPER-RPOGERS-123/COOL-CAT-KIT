# Полный локальный стек одной командой:  docker compose up --build
# API → http://localhost:8000 (Swagger: /docs)
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coolcatkit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coolcatkit"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/coolcatkit
      JWT_SECRET: dev-secret-change-me
      CORS_ORIGINS: "*"
      MEDIA_DIR: /app/media
      AUTO_INIT_DB: "1"
    ports:
      - "8000:8000"
    volumes:
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  media:
